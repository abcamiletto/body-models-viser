name: release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Rust
        run: |
          cargo fmt --check
          cargo clippy --release --lib --bins -- -D warnings
          cargo test --release --lib --bins
      - name: Build client
        run: |
          cd client
          npm ci
          npm test
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish
